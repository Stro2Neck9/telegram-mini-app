<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 16px;
            color: #2c3e50;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(102,126,234,0.2);
        }
        
        .balance {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 5px;
            border-radius: 30px;
        }
        
        .nav-item {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .nav-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .tasks-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .task-item {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .task-item.completed {
            opacity: 0.7;
            background: #f1f3f5;
        }
        
        .task-button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .task-button.completed {
            background: #4caf50;
        }
        
        .task-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .refresh-btn {
            width: 100%;
            padding: 15px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        .refresh-btn:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #2c3e50;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        
        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }
        
        .hidden { display: none; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <div>Task Bot</div>
        <div class="balance" id="balance">0</div>
        <div id="username">Загрузка...</div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="switchTab('tasks')">📋 Задания</div>
        <div class="nav-item" onclick="switchTab('stats')">📊 Статистика</div>
    </div>

    <div id="tasksSection">
        <div class="tasks-section">
            <div style="font-weight:600; margin-bottom:15px;">📋 Доступные задания</div>
            <div id="tasksList" class="tasks-list">
                <div class="loading">
                    <div class="spinner"></div>
                    Загрузка заданий...
                </div>
            </div>
        </div>
    </div>

    <div id="statsSection" class="hidden">
        <div class="tasks-section">
            <div style="font-weight:600; margin-bottom:15px;">📊 Твоя статистика</div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="statBalance">0</div>
                    <div>Монет</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statCompleted">0</div>
                    <div>Выполнено</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statAvailable">0</div>
                    <div>Доступно</div>
                </div>
            </div>
        </div>
    </div>

    <button class="refresh-btn" onclick="refreshData()">🔄 Обновить</button>

    <div class="toast" id="toast"></div>

    <script>
        // Инициализация
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        let userData = { balance: 0, tasks: [] };
        let currentTab = 'tasks';

        if (user) {
            document.getElementById('username').textContent = user.username ? `@${user.username}` : (user.first_name || 'Пользователь');
        }

        // Отправка данных боту
        function sendToBot(action, data = {}) {
            const payload = { action, user_id: user?.id, ...data };
            console.log('📤 Отправка:', payload);
            tg.sendData(JSON.stringify(payload));
        }

        // Загрузка данных
        function loadUserData() { sendToBot('get_user_data'); }
        function loadTasks() { sendToBot('get_tasks'); }
        
        function refreshData() {
            showToast('🔄 Обновление...');
            loadUserData();
            loadTasks();
        }

        // Переключение табов
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach((el, i) => {
                el.classList.toggle('active', (tab === 'tasks' && i === 0) || (tab === 'stats' && i === 1));
            });
            document.getElementById('tasksSection').classList.toggle('hidden', tab !== 'tasks');
            document.getElementById('statsSection').classList.toggle('hidden', tab !== 'stats');
            if (tab === 'stats') updateStats();
        }

        // Выполнение задания
        function completeTask(taskId) {
            const button = event.target;
            button.disabled = true;
            button.textContent = '⏳';
            sendToBot('complete_task', { task_id: taskId });
        }

        // Отображение заданий
        function renderTasks() {
            const list = document.getElementById('tasksList');
            if (!userData.tasks?.length) {
                list.innerHTML = '<div class="loading">📭 Нет заданий</div>';
                return;
            }

            list.innerHTML = userData.tasks.map(task => `
                <div class="task-item ${task.completed ? 'completed' : ''}">
                    <div>
                        <strong>${escapeHtml(task.title)}</strong><br>
                        <span style="color:#27ae60;">💰 +${task.reward}</span>
                    </div>
                    <button class="task-button ${task.completed ? 'completed' : ''}" 
                            ${task.completed ? 'disabled' : ''}
                            onclick="completeTask(${task.id})">
                        ${task.completed ? '✓ Готово' : 'Выполнить'}
                    </button>
                </div>
            `).join('');
        }

        // Обновление статистики
        function updateStats() {
            const completed = userData.tasks?.filter(t => t.completed).length || 0;
            const available = userData.tasks?.filter(t => !t.completed).length || 0;
            document.getElementById('statBalance').textContent = userData.balance;
            document.getElementById('statCompleted').textContent = completed;
            document.getElementById('statAvailable').textContent = available;
        }

        // Уведомления
        function showToast(text, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        // Защита от XSS
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Обработка ответов от бота
        tg.onEvent('message', function(event) {
            try {
                console.log('📥 Получено:', event);
                const data = JSON.parse(event);
                
                if (data.balance !== undefined) {
                    userData.balance = data.balance;
                    document.getElementById('balance').textContent = data.balance;
                }
                
                if (data.tasks) {
                    userData.tasks = data.tasks;
                    renderTasks();
                    updateStats();
                }
                
                if (data.success !== undefined && data.taskId) {
                    if (data.success) {
                        showToast('✅ Задание выполнено!');
                        loadUserData();
                        loadTasks();
                    } else {
                        showToast('❌ Задание уже выполнено', 'error');
                        const buttons = document.querySelectorAll('.task-button');
                        buttons.forEach(btn => {
                            if (btn.textContent === '⏳') {
                                btn.disabled = false;
                                btn.textContent = 'Выполнить';
                            }
                        });
                    }
                }
                
                if (data.status === 'connected') {
                    console.log('✅ Связь работает');
                    showToast('✅ Связь установлена');
                }
            } catch (e) {}
        });

        // Тестовое соединение при загрузке
        setTimeout(() => {
            sendToBot('test_connection');
            refreshData();
        }, 1000);

        // Автосинхронизация каждые 10 секунд
        setInterval(() => sendToBot('sync'), 10000);
    </script>
</body>
</html>
